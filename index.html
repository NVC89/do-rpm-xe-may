<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <title>RPM Analyzer V7 - Balanced Filters</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 12px;
            color: #333;
            box-sizing: border-box;
        }

        *,
        *:before,
        *:after {
            box-sizing: inherit;
        }

        .panel {
            background: #fff;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        h2, h3 {
            margin-top: 0;
            color: #1a1a1a;
        }

        div:has(> button) {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }

        hr {
            border: 0;
            border-top: 1px solid #e5e7eb;
            margin: 12px 0;
            width: 100%;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            width: 100%;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #4b5563;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        button,
        input[type="file"]::-webkit-file-upload-button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary {
            background-color: #6b7280;
        }

        button.secondary:hover {
            background-color: #4b5563;
        }

        button.success {
            background-color: #10b981;
        }

        button.success:hover {
            background-color: #059669;
        }

        button.warning {
            background-color: #f59e0b;
        }

        button.warning:hover {
            background-color: #d97706;
        }

        input[type="number"],
        input[type="range"],
        select {
            width: 100%;
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="range"] {
            padding: 0;
            height: 6px;
            cursor: pointer;
        }

        input[type="number"]:focus,
        input[type="range"]:focus,
        select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .stat {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }

        .stat>div {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            text-align: center;
            font-size: 14px;
        }

        .stat>div b {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .calibration-status {
            background: #fef3c7;
            border: 1px solid #fcd34d;
            color: #92400e;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .calibration-status.success {
            background: #dcfce7;
            border-color: #bbf7d0;
            color: #166534;
        }

        .calibration-status.error {
            background: #fee2e2;
            border-color: #fecaca;
            color: #991b1b;
        }

        .calibration-status.info {
            background: #e0f2fe;
            border-color: #bae6fd;
            color: #0c4a6e;
        }

        .warning-status {
            background: #fef08a;
            border: 1px solid #fde047;
            color: #713f12;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .waveform-container {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .waveform-label {
            font-size: 12px;
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 8px;
        }

        canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
            max-height: 280px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #fff;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 400px;
            font-size: 14px;
        }

        th {
            background-color: #f1f5f9;
            color: #475569;
            font-weight: 600;
            text-align: left;
        }

        td, th {
            border: 1px solid #e2e8f0;
            padding: 10px 12px;
        }

        tr:nth-child(even) {
            background-color: #f8fafc;
        }

        #micStatus {
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            background: #e0f2fe;
            color: #0369a1;
        }

        #viewInfo, #liveRPM {
            font-size: 14px;
            font-weight: 600;
            color: #0f172a;
            margin-left: auto;
        }

        .param-display {
            font-size: 12px;
            color: #6b7280;
            margin-top: 2px;
        }

        .debug-info {
            font-size: 11px;
            color: #6b7280;
            background: #f3f4f6;
            padding: 8px;
            border-radius: 4px;
            margin-top: 8px;
            font-family: monospace;
            line-height: 1.5;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: #4b5563;
            text-transform: uppercase;
            margin-top: 12px;
            margin-bottom: 8px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 4px;
        }

        .info-box {
            background: #dbeafe;
            border-left: 4px solid #2563eb;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            color: #1e40af;
            margin-top: 8px;
            line-height: 1.4;
        }

        .info-box b {
            display: block;
            margin-bottom: 4px;
        }

        .toggle-advanced {
            font-size: 12px;
            padding: 4px 8px;
            cursor: pointer;
        }

        .advanced-section {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e5e7eb;
        }

        .advanced-section.show {
            display: block;
        }

        @media (max-width: 600px) {
            body {
                padding: 8px;
            }

            .panel {
                padding: 12px;
            }

            div:has(> button) {
                flex-direction: column;
                align-items: stretch;
            }

            button {
                width: 100%;
                text-align: center;
            }

            #viewInfo, #liveRPM {
                margin-left: 0;
                text-align: center;
                width: 100%;
                display: block;
                margin-top: 4px;
            }
        }
    </style>
</head>

<body>
    <div class="panel">
        <h2>🎙️ RPM Analyzer V7 - Balanced Input</h2>
        <div>
            <input id="file" type="file" accept="audio/*,.m4a,.aac,.mp3,.wav,.ogg,.webm">
            <button onclick="analyze()">Phân tích File</button>
            <button onclick="prevView()">◀ Prev</button>
            <button onclick="nextView()">Next ▶</button>
            <span id="viewInfo"></span>
        </div>
        <hr>
        <div>
            <button onclick="startMic()" class="success"> 🎤 Start Mic </button>
            <button onclick="stopMic()" class="secondary"> ⏹ Stop Mic </button>
            <span id="micStatus">Stopped</span>
            <span id="liveRPM"></span>
        </div>

        <div id="signalWarning"></div>
        <div id="calibrationStatus"></div>

        <hr>
        <div class="section-title">🎚️ Cài đặt Microphone (Đơn Giản)</div>
        <div class="row">
            <label>
                Input Gain 🔊
                <input id="inputGain" type="range" min="50" max="300" step="10" value="100">
                <span class="param-display" id="inputGainDisplay">100%</span>
                <div class="info-box">
                    <b>📝 Điều chỉnh độ nhạy mic:</b> Tăng nếu tín hiệu quá yếu. Hạ nếu bị cắt xén.
                </div>
            </label>
            <label>
                Noise Floor 🚫
                <input id="noiseFloor" type="range" min="0.001" max="0.05" step="0.001" value="0.01">
                <span class="param-display" id="noiseFloorDisplay">0.01</span>
                <div class="info-box">
                    <b>📝 Loại bỏ tiếng yếu:</b> Tín hiệu dưới ngưỡng này sẽ bị bỏ. Tăng nếu quá nhiều nhiễu nền.
                </div>
            </label>
            <label>
                High Pass Filter 🔉
                <input id="hpfFreq" type="range" min="0" max="100" step="5" value="20">
                <span class="param-display" id="hpfDisplay">20 Hz</span>
                <div class="info-box">
                    <b>📝 Loại bỏ tiếng rầm rầm:</b> Tăng nếu còn rầm. Để 0 nếu không cần.
                </div>
            </label>
        </div>

        <div>
            <button onclick="toggleAdvanced()" class="secondary toggle-advanced">⚙️ Cài đặt nâng cao</button>
        </div>

        <div id="advancedSection" class="advanced-section">
            <div class="section-title">⚙️ Cài Đặt Nâng Cao (Tùy Chỉnh)</div>
            <div class="row">
                <label>
                    Low Pass Filter 🔊
                    <input id="lpfFreq" type="range" min="100" max="500" step="50" value="0">
                    <span class="param-display" id="lpfDisplay">Tắt (0 Hz)</span>
                    <div class="info-box">
                        <b>📝 Loại bỏ tiếng cao:</b> Để 0 để tắt. Bật nếu còn nhiễu cao tần.
                    </div>
                </label>
                <label>
                    Compressor Ratio 📊
                    <input id="compRatio" type="range" min="1" max="10" step="0.5" value="1">
                    <span class="param-display" id="compRatioDisplay">1:1 (Tắt)</span>
                    <div class="info-box">
                        <b>📝 Nén tín hiệu:</b> 1:1 = tắt. Tăng nếu muốn làm tín hiệu đều hơn.
                    </div>
                </label>
                <label>
                    Normalize Mode 🎯
                    <select id="normalizeMode">
                        <option value="off">Off (Khuyến nghị 👈)</option>
                        <option value="peak">Peak</option>
                        <option value="rms">RMS</option>
                    </select>
                </label>
            </div>
        </div>

        <hr>
        <div class="section-title">📊 Tham số phân tích</div>
        <div class="row">
            <label>
                Envelope
                <input id="envWin" type="number" value="32">
            </label>
            <label>
                Smooth
                <input id="smooth" type="number" value="15">
            </label>
            <label>
                Threshold
                <input id="thr" type="range" min="0.3" max="1.5" step="0.05" value="0.75">
                <span class="param-display" id="thrDisplay">0.75</span>
            </label>
            <label>
                Peak ms
                <input id="peakMs" type="number" value="70">
            </label>
            <label>
                View(s)
                <input id="viewSec" type="number" value="1" step="0.5">
            </label>
        </div>
        <br>
        <button onclick="resetParameters()" class="secondary">↻ Reset</button>
        <button onclick="loadPreset('safe')" class="warning">📍 An Toàn (Mặc Định)</button>
        <button onclick="loadPreset('quiet')" class="secondary">📍 Yên Tĩnh</button>
        <button onclick="loadPreset('noisy')" class="secondary">📍 Ồn Ào</button>
        
        <div class="debug-info" id="debugInfo"></div>
    </div>

    <div class="panel">
        <div id="stats" class="stat"></div>
    </div>

    <div class="panel">
        <div class="waveform-container">
            <div class="waveform-label">📻 Raw Input Signal</div>
            <canvas id="rawCanvas" width="1400" height="180"></canvas>
        </div>
        <div class="waveform-container">
            <div class="waveform-label">🔧 After Processing</div>
            <canvas id="processedCanvas" width="1400" height="180"></canvas>
        </div>
    </div>

    <div class="panel">
        <h3>📈 Envelope + Peaks</h3>
        <canvas id="envCanvas" width="1400" height="280"></canvas>
    </div>

    <div class="panel">
        <h3>📊 FFT Envelope</h3>
        <canvas id="fftCanvas" width="1400" height="240"></canvas>
    </div>

    <div class="panel">
        <h3>📋 Peak Table</h3>
        <table id="peakTable">
            <tr>
                <th>#</th>
                <th>Time(s)</th>
                <th>Period(ms)</th>
                <th>RPM</th>
            </tr>
        </table>
    </div>

    <script>
        let G = {};
        const BUFFER_DURATION = 3;
        const CALIBRATION_DURATION = 3;

        let micContext = null;
        let analyser = null;
        let micStream = null;
        let lastUpdate = 0;
        let lastFFT = 0;
        let isCalibrating = false;
        let calibrationTime = 0;

        let realtimeBuffer = [];

        const DEFAULT_PARAMS = {
            inputGain: 100,
            noiseFloor: 0.01,
            hpfFreq: 20,
            lpfFreq: 0,
            compRatio: 1,
            normalizeMode: 'off',
            envWin: 32,
            smooth: 15,
            thr: 0.75,
            peakMs: 70,
            viewSec: 1
        };

        const PRESETS = {
            safe: {
                inputGain: 100,
                noiseFloor: 0.01,
                hpfFreq: 20,
                lpfFreq: 0,
                compRatio: 1,
                normalizeMode: 'off',
                thr: 0.75
            },
            quiet: {
                inputGain: 150,
                noiseFloor: 0.015,
                hpfFreq: 30,
                lpfFreq: 300,
                compRatio: 2,
                normalizeMode: 'off',
                thr: 0.8
            },
            noisy: {
                inputGain: 80,
                noiseFloor: 0.02,
                hpfFreq: 50,
                lpfFreq: 250,
                compRatio: 3,
                normalizeMode: 'off',
                thr: 0.65
            }
        };

        let debugInfo = {
            inputPeak: 0,
            outputPeak: 0,
            rmsLevel: 0,
            gainApplied: 1,
            analysisTime: 0,
            peakClipping: false
        };

        function median(a) {
            if (!a.length) return 0;
            let b = [...a].sort((x, y) => x - y);
            return b[Math.floor(b.length / 2)];
        }

        function stddev(a) {
            if (!a.length) return 0;
            const mean = a.reduce((x, y) => x + y, 0) / a.length;
            const variance = a.reduce((x, y) => x + Math.pow(y - mean, 2), 0) / a.length;
            return Math.sqrt(variance);
        }

        function calculateRMS(signal) {
            if (!signal.length) return 0;
            let sum = 0;
            for (let i = 0; i < signal.length; i++) {
                sum += signal[i] * signal[i];
            }
            return Math.sqrt(sum / signal.length);
        }

        function calculatePeak(signal) {
            if (!signal.length) return 0;
            let max = 0;
            for (let i = 0; i < signal.length; i++) {
                const abs = signal[i] < 0 ? -signal[i] : signal[i];
                if (abs > max) max = abs;
            }
            return max;
        }

        // Simple 1st order HPF
        function applyHPF(signal, hpfFreq, sampleRate) {
            if (hpfFreq <= 0) return signal;
            
            const rc = 1 / (2 * Math.PI * hpfFreq);
            const dt = 1 / sampleRate;
            const alpha = rc / (rc + dt);
            
            let filtered = [];
            let prev = 0;
            
            for (let i = 0; i < signal.length; i++) {
                const out = alpha * (prev + signal[i] - (i > 0 ? signal[i-1] : 0));
                filtered.push(out);
                prev = out;
            }
            
            return filtered;
        }

        // Simple 1st order LPF
        function applyLPF(signal, lpfFreq, sampleRate) {
            if (lpfFreq <= 0) return signal;
            
            const rc = 1 / (2 * Math.PI * lpfFreq);
            const dt = 1 / sampleRate;
            const alpha = dt / (rc + dt);
            
            let filtered = [];
            let prev = signal[0] || 0;
            
            for (let i = 0; i < signal.length; i++) {
                prev = alpha * signal[i] + (1 - alpha) * prev;
                filtered.push(prev);
            }
            
            return filtered;
        }

        function applyCompressor(signal, ratio) {
            if (ratio <= 1) return signal;
            
            const peak = calculatePeak(signal);
            if (peak === 0) return signal;
            
            const threshold = 0.5;
            
            return signal.map(x => {
                const level = Math.abs(x) / peak;
                if (level > threshold) {
                    const compressed = threshold + (level - threshold) / ratio;
                    const sign = x < 0 ? -1 : 1;
                    return sign * compressed * peak;
                }
                return x;
            });
        }

        function processSignal(raw, sampleRate) {
            const inputGain = Number(document.getElementById("inputGain").value) / 100;
            const noiseFloor = Number(document.getElementById("noiseFloor").value);
            const hpfFreq = Number(document.getElementById("hpfFreq").value);
            const lpfFreq = Number(document.getElementById("lpfFreq").value);
            const compRatio = Number(document.getElementById("compRatio").value);

            let processed = [...raw];

            // 1. Input Gain
            processed = processed.map(x => x * inputGain);
            debugInfo.inputPeak = calculatePeak(processed);

            // 2. HPF
            processed = applyHPF(processed, hpfFreq, sampleRate);

            // 3. LPF
            processed = applyLPF(processed, lpfFreq, sampleRate);

            // 4. Noise Floor (Gating)
            processed = processed.map(x => Math.abs(x) < noiseFloor ? 0 : x);

            // 5. Compressor
            processed = applyCompressor(processed, compRatio);

            // 6. Check clipping
            const outputPeak = calculatePeak(processed);
            debugInfo.outputPeak = outputPeak;
            debugInfo.peakClipping = outputPeak > 0.95;
            debugInfo.rmsLevel = calculateRMS(processed);
            debugInfo.gainApplied = inputGain;

            return { processed, rawForDrawing: [...raw] };
        }

        function fftMag(signal) {
            let N = Math.min(2048, signal.length);
            let out = [];
            for (let k = 1; k < N / 2; k++) {
                let re = 0, im = 0;
                for (let n = 0; n < N; n++) {
                    let ang = 2 * Math.PI * k * n / N;
                    re += signal[n] * Math.cos(ang);
                    im -= signal[n] * Math.sin(ang);
                }
                out.push(Math.sqrt(re * re + im * im));
            }
            return out;
        }

        function analyzeSamples(raw, sr) { 
            const startAnalysis = performance.now();
            const { processed, rawForDrawing } = processSignal(raw, sr);
            
            const envelopeWindow = Number(document.getElementById("envWin").value); 
            const smoothN = Number(document.getElementById("smooth").value); 
            const thresholdFactor = Number(document.getElementById("thr").value); 
            const peakDistanceMs = Number(document.getElementById("peakMs").value); 

            let envelope = []; 
            for (let i = 0; i < processed.length; i += envelopeWindow) { 
                let s = 0, c = 0; 
                for (let j = i; j < i + envelopeWindow && j < processed.length; j++) {
                    s += Math.abs(processed[j]);
                    c++;
                }
                envelope.push(s / c);
            }

            let sm = [];
            for (let i = 0; i < envelope.length; i++) {
                let s = 0, c = 0;
                for (let j = i - smoothN; j <= i + smoothN; j++) {
                    if (j >= 0 && j < envelope.length) {
                        s += envelope[j];
                        c++;
                    }
                }
                sm.push(s / c);
            }

            const mean = sm.reduce((a, b) => a + b, 0) / sm.length;
            const threshold = mean * thresholdFactor;
            const minDist = Math.floor(peakDistanceMs / 1000 * sr / envelopeWindow);

            let peaks = [];
            let last = -999999;

            for (let i = 1; i < sm.length - 1; i++) { 
                if (sm[i] > threshold && sm[i] > sm[i - 1] && sm[i] > sm[i + 1]) { 
                    if (i - last > minDist) { 
                        peaks.push(i);
                        last = i;
                    }
                }
            }

            let periods = [];
            let rpms = [];

            for(let i=1;i<peaks.length;i++){
                let period = (peaks[i]-peaks[i-1]) * envelopeWindow / sr;
                periods.push(period);
                rpms.push(120 / period);
            }

            const medPeriod = median(periods); 
            const peakFreq = medPeriod ? 1 / medPeriod : 0; 
            const rpm120 = peakFreq * 120; 
            const rpm240 = peakFreq * 240; 
            const fft = fftMag(sm); 
            let maxI = 0; 
            for (let i = 1; i < fft.length; i++) { 
                if (fft[i] > fft[maxI]) maxI = i;
            } 
            const envRate = sr / envelopeWindow; 
            const fftFreq = maxI * envRate / Math.min(2048, sm.length);

            debugInfo.analysisTime = performance.now() - startAnalysis;

            return {
                sm,
                peaks,
                threshold,
                periods,
                rpms,
                fft,
                fftFreq,
                peakFreq,
                rpm120,
                rpm240,
                duration: raw.length / sr,
                sr,
                envelopeWindow,
                rpmStddev: stddev(rpms),
                peakCount: peaks.length,
                rawSignal: rawForDrawing,
                processedSignal: processed
            };
        }

        function updateSignalWarning() {
            const warning = document.getElementById('signalWarning');
            let message = '';
            let type = 'info';

            if (debugInfo.inputPeak < 0.05) {
                message = '⚠️ <b>Tín hiệu quá yếu!</b> Tăng Input Gain lên 150-200%.';
                type = 'warning';
            } else if (debugInfo.peakClipping) {
                message = '⚠️ <b>Tín hiệu bị cắt xén!</b> Hạ Input Gain xuống 50-80%.';
                type = 'error';
            } else if (debugInfo.outputPeak > 0.3) {
                message = '✅ <b>Tín hiệu tốt!</b> Mức cân bằng.';
                type = 'success';
            }

            if (message) {
                warning.innerHTML = `<div class="calibration-status ${type}">${message}</div>`;
            } else {
                warning.innerHTML = '';
            }
        }

        function updateDebugInfo() {
            const debugDiv = document.getElementById('debugInfo');
            debugDiv.innerHTML = `
                <b>📊 Signal Metrics:</b><br>
                Input Peak: ${debugInfo.inputPeak.toFixed(3)} | 
                Output Peak: ${debugInfo.outputPeak.toFixed(3)} | 
                RMS: ${debugInfo.rmsLevel.toFixed(3)} | 
                Gain: ${debugInfo.gainApplied.toFixed(2)}x<br>
                <b>⏱️ Performance:</b> Analysis: ${debugInfo.analysisTime.toFixed(1)}ms
                ${debugInfo.peakClipping ? ' | ⚠️ CLIPPING' : ''}
            `;
        }

        function updateUI(result) {
            G = { ...result, start: G.start || 0 };

            renderStats({
                sampleRate: result.sr,
                duration: result.duration,
                peakCount: result.peaks.length,
                medPeriod: result.peakFreq ? 1000 / result.peakFreq : 0,
                peakFreq: result.peakFreq,
                fftFreq: result.fftFreq,
                rpm120: result.rpm120,
                rpm240: result.rpm240,
                rpmStddev: result.rpmStddev
            });

            buildPeakTable(result.periods, result.rpms);
            drawWaveform(result.rawSignal, "rawCanvas", "#3b82f6", "Input");
            drawWaveform(result.processedSignal, "processedCanvas", "#10b981", "Output");
            drawEnvelope();
            drawFFT();

            document.getElementById("liveRPM").innerHTML =
                `RPM x120: ${result.rpm120.toFixed(0)} | Peak: ${result.peakFreq.toFixed(2)} Hz | Stddev: ${result.rpmStddev.toFixed(0)}`;
            
            updateDebugInfo();
            updateSignalWarning();
        }

        async function analyze() {
            const f = document.getElementById("file").files[0];
            if (!f) {
                alert("Chọn file");
                return;
            }

            const ctx = new AudioContext();
            const ab = await f.arrayBuffer();
            const audio = await ctx.decodeAudioData(ab);
            const result = analyzeSamples(audio.getChannelData(0), audio.sampleRate);
            updateUI(result);
        }

        function buildPeakTable(periods, rpms) {
            peakTable.innerHTML = "<tr><th>#</th><th>Time(s)</th><th>Period(ms)</th><th>RPM</th></tr>";
            G.peaks.forEach((p, i) => {
                const t = (p * G.envelopeWindow / G.sr).toFixed(3);
                const period = i ? (periods[i - 1] * 1000).toFixed(1) : "";
                const rpm = i ? rpms[i - 1].toFixed(0) : "";
                peakTable.innerHTML += `<tr><td>${i + 1}</td><td>${t}</td><td>${period}</td><td>${rpm}</td></tr>`;
            });
        }

        function renderStats(s) {
            stats.innerHTML = `
                <div><b>Sample Rate</b><br>${s.sampleRate.toFixed(0)} Hz</div>
                <div><b>Duration</b><br>${s.duration.toFixed(3)} s</div>
                <div><b>Detected Peaks</b><br>${s.peakCount}</div>
                <div><b>Median Period</b><br>${s.medPeriod.toFixed(1)} ms</div>
                <div><b>Peak Frequency</b><br>${s.peakFreq.toFixed(2)} Hz</div>
                <div><b>FFT Envelope</b><br>${s.fftFreq.toFixed(2)} Hz</div>
                <div><b>RPM x120</b><br>${s.rpm120.toFixed(0)}</div>
                <div><b>RPM x240</b><br>${s.rpm240.toFixed(0)}</div>
                <div><b>RPM StdDev</b><br>${s.rpmStddev.toFixed(0)}</div>
            `;
        }

        function drawWaveform(signal, canvasId, color, label) {
            let c = document.getElementById(canvasId), ctx = c.getContext("2d");
            ctx.clearRect(0, 0, c.width, c.height);
            if (!signal || !signal.length) return;

            const step = Math.max(1, Math.floor(signal.length / 1000));
            const samples = [];
            for (let i = 0; i < signal.length; i += step) {
                samples.push(signal[i]);
            }

            const peak = Math.max(...samples.map(x => Math.abs(x))) || 1;

            ctx.strokeStyle = color;
            ctx.lineWidth = 1;
            ctx.beginPath();
            samples.forEach((v, i) => {
                let x = i * c.width / samples.length;
                let y = c.height / 2 - (v / peak) * (c.height / 2);
                i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
            });
            ctx.stroke();

            ctx.strokeStyle = "#d1d5db";
            ctx.setLineDash([3, 3]);
            ctx.beginPath();
            ctx.moveTo(0, c.height / 2);
            ctx.lineTo(c.width, c.height / 2);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawEnvelope() {
            let c = envCanvas, ctx = c.getContext("2d");
            ctx.clearRect(0, 0, c.width, c.height);

            if (!G.sm) return;

            let win = Number(document.getElementById("viewSec").value);
            let end = G.start + win;

            viewInfo.textContent = `${G.start.toFixed(2)}s → ${Math.min(end, G.duration).toFixed(2)}s`;

            let sIdx = Math.floor(G.start * G.sr / G.envelopeWindow);
            let eIdx = Math.min(G.sm.length, Math.floor(end * G.sr / G.envelopeWindow));

            let arr = G.sm.slice(sIdx, eIdx);
            if (!arr.length) return;

            let max = G.threshold;
            for (let v of arr) if (v > max) max = v;

            ctx.strokeStyle = "#2563eb";
            ctx.lineWidth = 2;
            ctx.beginPath();
            arr.forEach((v, i) => {
                let x = i * c.width / arr.length;
                let y = c.height - (v / max) * c.height;
                i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
            });
            ctx.stroke();

            ctx.strokeStyle = "#ef4444";
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            let ty = c.height - (G.threshold / max) * c.height;
            ctx.beginPath();
            ctx.moveTo(0, ty);
            ctx.lineTo(c.width, ty);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.strokeStyle = "#10b981";
            ctx.lineWidth = 2;
            ctx.fillStyle = "#10b981";
            ctx.font = "12px sans-serif";

            G.peaks.forEach((p, idx) => {
                if (p >= sIdx && p < eIdx) {
                    let x = (p - sIdx) * c.width / arr.length;
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, c.height);
                    ctx.stroke();
                    ctx.fillText(idx + 1, x + 2, 12);
                }
            });
        }

        function drawFFT() {
            let c = fftCanvas, ctx = c.getContext("2d");
            ctx.clearRect(0, 0, c.width, c.height);
            if (!G.fft) return;

            let max = Math.max(...G.fft);
            ctx.strokeStyle = "#8b5cf6";
            ctx.lineWidth = 2;
            ctx.beginPath();
            G.fft.forEach((v, i) => {
                let x = i * c.width / G.fft.length;
                let y = c.height - (v / max) * c.height;
                i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
            });
            ctx.stroke();
        }

        async function startMic() {
            try {
                micContext = new AudioContext();
                micStream = await navigator.mediaDevices.getUserMedia({audio: true});

                const source = micContext.createMediaStreamSource(micStream);
                analyser = micContext.createAnalyser();
                analyser.fftSize = 4096;
                source.connect(analyser);

                realtimeBuffer = [];
                isCalibrating = true;
                calibrationTime = 0;

                micStatus.textContent = "Recording (Calibrating...)";
                document.getElementById('calibrationStatus').innerHTML = '<div class="calibration-status info">🔧 Đang hiệu chỉnh... (3 giây)</div>';

                realtimeLoop();
            } catch (err) {
                alert("Không thể truy cập micro: " + err.message);
            }
        }

        function stopMic() {
            if (micStream) {
                micStream.getTracks().forEach(t => t.stop());
            }
            analyser = null;
            isCalibrating = false;
            micStatus.textContent = "Stopped";
            document.getElementById('calibrationStatus').innerHTML = '';
        }

        function realtimeLoop() {
            if (!analyser) return;

            const buf = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buf);
            realtimeBuffer.push(...buf);

            let maxSamples = BUFFER_DURATION * micContext.sampleRate;
            if (realtimeBuffer.length > maxSamples) {
                realtimeBuffer = realtimeBuffer.slice(realtimeBuffer.length - maxSamples);
            }

            const now = performance.now();
            
            if(now - lastUpdate > 500){
                const result = analyzeSamples(Float32Array.from(realtimeBuffer), micContext.sampleRate);
                
                if (isCalibrating) {
                    calibrationTime += 0.5;
                    if (calibrationTime >= CALIBRATION_DURATION) {
                        document.getElementById('calibrationStatus').innerHTML = '<div class="calibration-status success">✅ Hiệu chỉnh hoàn tất! Bắt đầu đo RPM...</div>';
                        isCalibrating = false;
                        micStatus.textContent = "Recording (Live)";
                    }
                }
                
                updateUI(result);
                lastUpdate = now;
            }

            if(now - lastFFT > 500) {
                drawFFT();
                drawEnvelope();
                lastFFT = now;
            }

            requestAnimationFrame(realtimeLoop);
        }

        function prevView() {
            if (!G.duration) return;
            G.start = Math.max(0, (G.start || 0) - (+viewSec.value));
            drawEnvelope();
        }

        function nextView() {
            if (!G.duration) return;
            G.start = Math.min(Math.max(0, G.duration - (+viewSec.value)), (G.start || 0) + (+viewSec.value));
            drawEnvelope();
        }

        function toggleAdvanced() {
            const section = document.getElementById('advancedSection');
            section.classList.toggle('show');
        }

        function resetParameters() {
            Object.keys(DEFAULT_PARAMS).forEach(key => {
                const elem = document.getElementById(key);
                if (elem) elem.value = DEFAULT_PARAMS[key];
            });
            updateDisplays();
            document.getElementById('signalWarning').innerHTML = '';
            
            if (G.sm) {
                const result = analyzeSamples(Float32Array.from(realtimeBuffer || []), G.sr || 44100);
                updateUI(result);
            }
        }

        function loadPreset(name) {
            const preset = PRESETS[name];
            if (!preset) return;
            
            Object.keys(preset).forEach(key => {
                const elem = document.getElementById(key);
                if (elem) elem.value = preset[key];
            });
            updateDisplays();
            
            if (G.sm) {
                const result = analyzeSamples(Float32Array.from(realtimeBuffer || []), G.sr || 44100);
                updateUI(result);
            }
        }

        function updateDisplays() {
            document.getElementById("inputGainDisplay").textContent = document.getElementById("inputGain").value + "%";
            document.getElementById("noiseFloorDisplay").textContent = Number(document.getElementById("noiseFloor").value).toFixed(3);
            document.getElementById("hpfDisplay").textContent = (Number(document.getElementById("hpfFreq").value) || 0) + " Hz";
            const lpf = Number(document.getElementById("lpfFreq").value);
            document.getElementById("lpfDisplay").textContent = (lpf > 0 ? lpf + " Hz" : "Tắt (0 Hz)");
            const comp = Number(document.getElementById("compRatio").value);
            document.getElementById("compRatioDisplay").textContent = (comp <= 1 ? "1:1 (Tắt)" : comp.toFixed(1) + ":1");
            document.getElementById("thrDisplay").textContent = Number(document.getElementById("thr").value).toFixed(2);
        }

        ["inputGain", "noiseFloor", "hpfFreq", "lpfFreq", "compRatio", "normalizeMode", "thr", "envWin", "smooth", "peakMs"].forEach(id => {
            const elem = document.getElementById(id);
            if (elem) {
                elem.addEventListener("change", function() {
                    updateDisplays();
                    if (G.sm) {
                        const result = analyzeSamples(Float32Array.from(realtimeBuffer || []), G.sr || 44100);
                        updateUI(result);
                    }
                });
                elem.addEventListener("input", function() {
                    updateDisplays();
                });
            }
        });

        updateDisplays();
    </script>
</body>
