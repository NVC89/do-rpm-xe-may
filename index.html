<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <title>RPM Analyzer V6 - Advanced Noise Reduction</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 12px;
            color: #333;
            box-sizing: border-box;
        }

        *,
        *:before,
        *:after {
            box-sizing: inherit;
        }

        .panel {
            background: #fff;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        h2, h3 {
            margin-top: 0;
            color: #1a1a1a;
        }

        div:has(> button) {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }

        hr {
            border: 0;
            border-top: 1px solid #e5e7eb;
            margin: 12px 0;
            width: 100%;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            width: 100%;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #4b5563;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        button,
        input[type="file"]::-webkit-file-upload-button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        button:active {
            transform: scale(0.98);
        }

        button.secondary {
            background-color: #6b7280;
        }

        button.secondary:hover {
            background-color: #4b5563;
        }

        button.success {
            background-color: #10b981;
        }

        button.success:hover {
            background-color: #059669;
        }

        input[type="number"],
        input[type="range"],
        select {
            width: 100%;
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="range"] {
            padding: 0;
            height: 6px;
            cursor: pointer;
        }

        input[type="number"]:focus,
        input[type="range"]:focus,
        select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .stat {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }

        .stat>div {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            text-align: center;
            font-size: 14px;
        }

        .stat>div b {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .calibration-status {
            background: #fef3c7;
            border: 1px solid #fcd34d;
            color: #92400e;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .calibration-status.success {
            background: #dcfce7;
            border-color: #bbf7d0;
            color: #166534;
        }

        .calibration-status.error {
            background: #fee2e2;
            border-color: #fecaca;
            color: #991b1b;
        }

        .calibration-status.info {
            background: #e0f2fe;
            border-color: #bae6fd;
            color: #0c4a6e;
        }

        .waveform-container {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .waveform-label {
            font-size: 12px;
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 8px;
        }

        canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
            max-height: 320px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #fff;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 400px;
            font-size: 14px;
        }

        th {
            background-color: #f1f5f9;
            color: #475569;
            font-weight: 600;
            text-align: left;
        }

        td, th {
            border: 1px solid #e2e8f0;
            padding: 10px 12px;
        }

        tr:nth-child(even) {
            background-color: #f8fafc;
        }

        #micStatus {
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            background: #e0f2fe;
            color: #0369a1;
        }

        #viewInfo, #liveRPM {
            font-size: 14px;
            font-weight: 600;
            color: #0f172a;
            margin-left: auto;
        }

        .param-display {
            font-size: 12px;
            color: #6b7280;
            margin-top: 2px;
        }

        .debug-info {
            font-size: 11px;
            color: #6b7280;
            background: #f3f4f6;
            padding: 8px;
            border-radius: 4px;
            margin-top: 8px;
            font-family: monospace;
            line-height: 1.5;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: #4b5563;
            text-transform: uppercase;
            margin-top: 12px;
            margin-bottom: 8px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 4px;
        }

        .info-box {
            background: #dbeafe;
            border-left: 4px solid #2563eb;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            color: #1e40af;
            margin-top: 8px;
        }

        .info-box b {
            display: block;
            margin-bottom: 4px;
        }

        @media (max-width: 600px) {
            body {
                padding: 8px;
            }

            .panel {
                padding: 12px;
            }

            div:has(> button) {
                flex-direction: column;
                align-items: stretch;
            }

            button {
                width: 100%;
                text-align: center;
            }

            #viewInfo, #liveRPM {
                margin-left: 0;
                text-align: center;
                width: 100%;
                display: block;
                margin-top: 4px;
            }
        }
    </style>
</head>

<body>
    <div class="panel">
        <h2>🎙️ RPM Analyzer V6 - Noise Reduction</h2>
        <div>
            <input id="file" type="file" accept="audio/*,.m4a,.aac,.mp3,.wav,.ogg,.webm">
            <button onclick="analyze()">Phân tích File</button>
            <button onclick="prevView()">◀ Prev</button>
            <button onclick="nextView()">Next ▶</button>
            <span id="viewInfo"></span>
        </div>
        <hr>
        <div>
            <button onclick="startMic()" class="success"> 🎤 Start Mic </button>
            <button onclick="stopMic()" class="secondary"> ⏹ Stop Mic </button>
            <span id="micStatus">Stopped</span>
            <span id="liveRPM"></span>
        </div>

        <div id="calibrationStatus"></div>

        <hr>
        <div class="section-title">🎚️ Cài đặt Microphone (Bộ lọc)</div>
        <div class="row">
            <label>
                HPF (High Pass Filter) 🔊
                <input id="hpfFreq" type="range" min="5" max="100" step="5" value="20">
                <span class="param-display" id="hpfDisplay">20 Hz</span>
                <div class="info-box">
                    <b>📝 Loại bỏ tiếng thấp:</b> Cắt những tần số dưới ngưỡng. Tăng lên nếu còn rầm rầm.
                </div>
            </label>
            <label>
                LPF (Low Pass Filter) 🔉
                <input id="lpfFreq" type="range" min="100" max="500" step="50" value="250">
                <span class="param-display" id="lpfDisplay">250 Hz</span>
                <div class="info-box">
                    <b>📝 Loại bỏ tiếng cao:</b> Cắt những tần số trên ngưỡng. Hạ xuống nếu còn nhiễu cao.
                </div>
            </label>
            <label>
                Noise Gate 🚫
                <input id="noiseGate" type="range" min="0" max="0.1" step="0.01" value="0.02">
                <span class="param-display" id="noiseGateDisplay">0.02</span>
                <div class="info-box">
                    <b>📝 Ngưỡng im lặng:</b> Bỏ tín hiệu nhỏ hơn. Tăng nếu quá nhiều nhiễu nền.
                </div>
            </label>
            <label>
                Compressor Ratio 🎚️
                <input id="compRatio" type="range" min="1" max="10" step="0.5" value="4">
                <span class="param-display" id="compRatioDisplay">4:1</span>
                <div class="info-box">
                    <b>📝 Nén tín hiệu mạnh:</b> 4:1 = mỗi 4dB đầu vào thành 1dB. Làm tín hiệu đều hơn.
                </div>
            </label>
        </div>

        <hr>
        <div class="section-title">🔊 Điều chỉnh cường độ tín hiệu</div>
        <div class="row">
            <label>
                Volume Input (%)
                <input id="volumeInput" type="range" min="0" max="200" step="5" value="100">
                <span class="param-display" id="volumeDisplay">100%</span>
            </label>
            <label>
                Min Amplitude
                <input id="minAmplitude" type="range" min="0" max="0.5" step="0.01" value="0.05">
                <span class="param-display" id="minAmpDisplay">0.05</span>
            </label>
            <label>
                Max Amplitude
                <input id="maxAmplitude" type="range" min="0.1" max="1.0" step="0.05" value="0.8">
                <span class="param-display" id="maxAmpDisplay">0.8</span>
            </label>
            <label>
                Normalize
                <select id="normalizeMode">
                    <option value="off">Off</option>
                    <option value="peak">Peak</option>
                    <option value="rms" selected>RMS ⭐</option>
                </select>
                <span class="param-display" id="normalizeDisplay"></span>
            </label>
        </div>

        <hr>
        <div class="section-title">📊 Tham số phân tích</div>
        <div class="row">
            <label>
                Envelope
                <input id="envWin" type="number" value="32">
            </label>
            <label>
                Smooth
                <input id="smooth" type="number" value="15">
            </label>
            <label>
                Threshold
                <input id="thr" type="range" min="0.3" max="1.5" step="0.05" value="0.75">
                <span class="param-display" id="thrDisplay">0.75</span>
            </label>
            <label>
                Peak ms
                <input id="peakMs" type="number" value="70">
            </label>
            <label>
                View(s)
                <input id="viewSec" type="number" value="1" step="0.5">
            </label>
        </div>
        <br>
        <button onclick="resetParameters()" class="secondary">↻ Reset Parameters</button>
        <button onclick="loadPreset('quiet')" class="secondary">📍 Chế độ Yên Tĩnh</button>
        <button onclick="loadPreset('noisy')" class="secondary">📍 Chế độ Ồn Ào</button>
        
        <div class="debug-info" id="debugInfo"></div>
    </div>

    <div class="panel">
        <div id="stats" class="stat"></div>
    </div>

    <div class="panel">
        <div class="waveform-container">
            <div class="waveform-label">📻 Raw Waveform (Input)</div>
            <canvas id="rawCanvas" width="1400" height="180"></canvas>
        </div>
        <div class="waveform-container">
            <div class="waveform-label">🔧 Filtered Waveform (After HPF+LPF)</div>
            <canvas id="filteredCanvas" width="1400" height="180"></canvas>
        </div>
    </div>

    <div class="panel">
        <h3>📈 Envelope + Peaks</h3>
        <canvas id="envCanvas" width="1400" height="320"></canvas>
    </div>

    <div class="panel">
        <h3>📊 FFT Envelope</h3>
        <canvas id="fftCanvas" width="1400" height="260"></canvas>
    </div>

    <div class="panel">
        <h3>📋 Peak Table</h3>
        <table id="peakTable">
            <tr>
                <th>#</th>
                <th>Time(s)</th>
                <th>Period(ms)</th>
                <th>RPM</th>
            </tr>
        </table>
    </div>

    <script>
        let G = {};
        const BUFFER_DURATION = 3;
        const CALIBRATION_DURATION = 3;

        let micContext = null;
        let analyser = null;
        let micStream = null;
        let lastUpdate = 0;
        let lastFFT = 0;
        let isCalibrating = false;
        let calibrationTime = 0;

        let realtimeBuffer = [];

        const DEFAULT_PARAMS = {
            hpfFreq: 20,
            lpfFreq: 250,
            noiseGate: 0.02,
            compRatio: 4,
            volumeInput: 100,
            minAmplitude: 0.05,
            maxAmplitude: 0.8,
            normalizeMode: 'rms',
            envWin: 32,
            smooth: 15,
            thr: 0.75,
            peakMs: 70,
            viewSec: 1
        };

        const PRESETS = {
            quiet: {
                hpfFreq: 30,
                lpfFreq: 300,
                noiseGate: 0.05,
                compRatio: 2,
                volumeInput: 120,
                normalizeMode: 'rms',
                thr: 0.8
            },
            noisy: {
                hpfFreq: 50,
                lpfFreq: 200,
                noiseGate: 0.08,
                compRatio: 6,
                volumeInput: 80,
                normalizeMode: 'rms',
                thr: 0.6
            }
        };

        let debugInfo = {
            bufferSize: 0,
            peakLevel: 0,
            rmsLevel: 0,
            gainApplied: 1,
            analysisTime: 0
        };

        function median(a) {
            if (!a.length) return 0;
            let b = [...a].sort((x, y) => x - y);
            return b[Math.floor(b.length / 2)];
        }

        function stddev(a) {
            if (!a.length) return 0;
            const mean = a.reduce((x, y) => x + y, 0) / a.length;
            const variance = a.reduce((x, y) => x + Math.pow(y - mean, 2), 0) / a.length;
            return Math.sqrt(variance);
        }

        function calculateRMS(signal) {
            if (!signal.length) return 0;
            let sum = 0;
            for (let i = 0; i < signal.length; i++) {
                sum += signal[i] * signal[i];
            }
            return Math.sqrt(sum / signal.length);
        }

        function calculatePeak(signal) {
            if (!signal.length) return 0;
            let max = 0;
            for (let i = 0; i < signal.length; i++) {
                const abs = signal[i] < 0 ? -signal[i] : signal[i];
                if (abs > max) max = abs;
            }
            return max;
        }

        // Simple HPF + LPF (Butterworth-style approximation)
        function applyFilters(signal, hpfFreq, lpfFreq, sampleRate) {
            // HPF: Loại bỏ DC và tần số thấp
            let hpfed = [];
            let prev = 0;
            const hpfAlpha = 2 * Math.PI * hpfFreq / sampleRate / (1 + 2 * Math.PI * hpfFreq / sampleRate);
            
            for (let i = 0; i < signal.length; i++) {
                let out = hpfAlpha * (prev + signal[i] - (i > 0 ? signal[i-1] : 0));
                hpfed.push(out);
                prev = out;
            }

            // LPF: Loại bỏ tần số cao (nhiễu)
            let lpfed = [];
            const lpfAlpha = 2 * Math.PI * lpfFreq / sampleRate / (1 + 2 * Math.PI * lpfFreq / sampleRate);
            prev = hpfed[0];
            
            for (let i = 0; i < hpfed.length; i++) {
                prev = lpfAlpha * hpfed[i] + (1 - lpfAlpha) * prev;
                lpfed.push(prev);
            }

            return lpfed;
        }

        // Noise Gate: Loại bỏ tín hiệu dưới ngưỡng
        function applyNoiseGate(signal, threshold) {
            return signal.map(x => Math.abs(x) < threshold ? 0 : x);
        }

        // Compressor: Nén tín hiệu mạnh
        function applyCompressor(signal, ratio) {
            const peak = calculatePeak(signal);
            if (peak === 0) return signal;
            
            return signal.map(x => {
                const level = Math.abs(x) / peak;
                if (level > 0.5) {
                    // Nén phần lớn hơn 0.5
                    const compressed = 0.5 + (level - 0.5) / ratio;
                    return (x / Math.abs(x)) * compressed * peak;
                }
                return x;
            });
        }

        function normalizeSignal(signal, mode, targetMin, targetMax) {
            if (mode === 'off' || !signal.length) return signal;

            let reference = 0;
            if (mode === 'rms') {
                reference = calculateRMS(signal);
            } else if (mode === 'peak') {
                reference = calculatePeak(signal);
            }

            if (reference === 0) return signal;

            const targetRange = targetMax - targetMin;
            const desiredPeak = targetMin + targetRange / 2;
            const gain = desiredPeak / reference;

            return signal.map(x => Math.max(-1, Math.min(1, x * gain)));
        }

        function processSignal(raw, sampleRate) {
            const hpfFreq = Number(document.getElementById("hpfFreq").value);
            const lpfFreq = Number(document.getElementById("lpfFreq").value);
            const noiseGate = Number(document.getElementById("noiseGate").value);
            const compRatio = Number(document.getElementById("compRatio").value);
            const volumePercent = Number(document.getElementById("volumeInput").value);
            const minAmp = Number(document.getElementById("minAmplitude").value);
            const maxAmp = Number(document.getElementById("maxAmplitude").value);
            const normalizeMode = document.getElementById("normalizeMode").value;

            let processed = [...raw];

            // 1. Áp dụng Filters
            processed = applyFilters(processed, hpfFreq, lpfFreq, sampleRate);

            // 2. Noise Gate
            processed = applyNoiseGate(processed, noiseGate);

            // 3. Compressor
            processed = applyCompressor(processed, compRatio);

            // 4. Volume
            const volumeGain = volumePercent / 100;
            processed = processed.map(x => x * volumeGain);

            // 5. Debug
            debugInfo.peakLevel = calculatePeak(processed);
            debugInfo.rmsLevel = calculateRMS(processed);
            debugInfo.gainApplied = volumeGain;

            // 6. Normalize
            if (normalizeMode !== 'off') {
                processed = normalizeSignal(processed, normalizeMode, minAmp, maxAmp);
            } else {
                processed = processed.map(x => {
                    if (Math.abs(x) < minAmp) return 0;
                    return Math.max(-maxAmp, Math.min(maxAmp, x));
                });
            }

            return { processed, rawForDrawing: [...raw] };
        }

        function fftMag(signal) {
            let N = Math.min(2048, signal.length);
            let out = [];
            for (let k = 1; k < N / 2; k++) {
                let re = 0, im = 0;
                for (let n = 0; n < N; n++) {
                    let ang = 2 * Math.PI * k * n / N;
                    re += signal[n] * Math.cos(ang);
                    im -= signal[n] * Math.sin(ang);
                }
                out.push(Math.sqrt(re * re + im * im));
            }
            return out;
        }

        function analyzeSamples(raw, sr) { 
            const startAnalysis = performance.now();
            const { processed, rawForDrawing } = processSignal(raw, sr);
            
            const envelopeWindow = Number(document.getElementById("envWin").value); 
            const smoothN = Number(document.getElementById("smooth").value); 
            const thresholdFactor = Number(document.getElementById("thr").value); 
            const peakDistanceMs = Number(document.getElementById("peakMs").value); 

            let envelope = []; 
            for (let i = 0; i < processed.length; i += envelopeWindow) { 
                let s = 0, c = 0; 
                for (let j = i; j < i + envelopeWindow && j < processed.length; j++) {
                    s += Math.abs(processed[j]);
                    c++;
                }
                envelope.push(s / c);
            }

            let sm = [];
            for (let i = 0; i < envelope.length; i++) {
                let s = 0, c = 0;
                for (let j = i - smoothN; j <= i + smoothN; j++) {
                    if (j >= 0 && j < envelope.length) {
                        s += envelope[j];
                        c++;
                    }
                }
                sm.push(s / c);
            }

            const mean = sm.reduce((a, b) => a + b, 0) / sm.length;
            const threshold = mean * thresholdFactor;
            const minDist = Math.floor(peakDistanceMs / 1000 * sr / envelopeWindow);

            let peaks = [];
            let last = -999999;

            for (let i = 1; i < sm.length - 1; i++) { 
                if (sm[i] > threshold && sm[i] > sm[i - 1] && sm[i] > sm[i + 1]) { 
                    if (i - last > minDist) { 
                        peaks.push(i);
                        last = i;
                    }
                }
            }

            let periods = [];
            let rpms = [];

            for(let i=1;i<peaks.length;i++){
                let period = (peaks[i]-peaks[i-1]) * envelopeWindow / sr;
                periods.push(period);
                rpms.push(120 / period);
            }

            const medPeriod = median(periods); 
            const peakFreq = medPeriod ? 1 / medPeriod : 0; 
            const rpm120 = peakFreq * 120; 
            const rpm240 = peakFreq * 240; 
            const fft = fftMag(sm); 
            let maxI = 0; 
            for (let i = 1; i < fft.length; i++) { 
                if (fft[i] > fft[maxI]) maxI = i;
            } 
            const envRate = sr / envelopeWindow; 
            const fftFreq = maxI * envRate / Math.min(2048, sm.length);

            debugInfo.analysisTime = performance.now() - startAnalysis;

            return {
                sm,
                peaks,
                threshold,
                periods,
                rpms,
                fft,
                fftFreq,
                peakFreq,
                rpm120,
                rpm240,
                duration: raw.length / sr,
                sr,
                envelopeWindow,
                rpmStddev: stddev(rpms),
                peakCount: peaks.length,
                rawSignal: rawForDrawing,
                processedSignal: processed
            };
        }

        function autoCalibrate(result) {
            const rpmStddev = result.rpmStddev;
            const peakCount = result.peakCount;
            const duration = result.duration;
            const peakDensity = peakCount / Math.max(duration, 0.1);

            let recommendations = [];
            let thrValue = Number(document.getElementById("thr").value);
            let smoothValue = Number(document.getElementById("smooth").value);

            if (rpmStddev > 200) {
                if (thrValue < 1.2) {
                    thrValue = Math.min(1.5, thrValue + 0.1);
                    recommendations.push("🔊 Nhiễu cao: Tăng Threshold");
                }
            }

            if (rpmStddev < 50 && peakCount < 3) {
                if (thrValue > 0.5) {
                    thrValue = Math.max(0.3, thrValue - 0.1);
                    recommendations.push("📉 Peak thiếu: Hạ Threshold");
                }
            }

            if (peakDensity > 10) {
                if (smoothValue < 30) {
                    smoothValue = Math.min(30, smoothValue + 3);
                    recommendations.push("📈 Peak quá dày: Tăng Smooth");
                }
            }

            return { thrValue, smoothValue, recommendations };
        }

        function updateCalibrationStatus(message, type = 'info') {
            const statusDiv = document.getElementById('calibrationStatus');
            statusDiv.innerHTML = `<div class="calibration-status ${type}">${message}</div>`;
        }

        function updateDebugInfo() {
            debugInfo.bufferSize = realtimeBuffer.length;
            const debugDiv = document.getElementById('debugInfo');
            debugDiv.innerHTML = `
                <b>📊 Signal Metrics:</b><br>
                Peak: ${debugInfo.peakLevel.toFixed(3)} | RMS: ${debugInfo.rmsLevel.toFixed(3)} | Gain: ${debugInfo.gainApplied.toFixed(2)}x<br>
                <b>⏱️ Performance:</b> Analysis: ${debugInfo.analysisTime.toFixed(1)}ms
            `;
        }

        function updateUI(result) {
            G = { ...result, start: G.start || 0 };

            renderStats({
                sampleRate: result.sr,
                duration: result.duration,
                peakCount: result.peaks.length,
                medPeriod: result.peakFreq ? 1000 / result.peakFreq : 0,
                peakFreq: result.peakFreq,
                fftFreq: result.fftFreq,
                rpm120: result.rpm120,
                rpm240: result.rpm240,
                rpmStddev: result.rpmStddev
            });

            buildPeakTable(result.periods, result.rpms);
            drawRawWaveform(result.rawSignal);
            drawFilteredWaveform(result.processedSignal);
            drawEnvelope();
            drawFFT();

            document.getElementById("liveRPM").innerHTML =
                `RPM x120: ${result.rpm120.toFixed(0)} | Peak: ${result.peakFreq.toFixed(2)} Hz | Stddev: ${result.rpmStddev.toFixed(0)}`;
            
            updateDebugInfo();
        }

        async function analyze() {
            const f = document.getElementById("file").files[0];
            if (!f) {
                alert("Chọn file");
                return;
            }

            const ctx = new AudioContext();
            const ab = await f.arrayBuffer();
            const audio = await ctx.decodeAudioData(ab);
            const result = analyzeSamples(audio.getChannelData(0), audio.sampleRate);
            updateUI(result);
        }

        function buildPeakTable(periods, rpms) {
            peakTable.innerHTML = "<tr><th>#</th><th>Time(s)</th><th>Period(ms)</th><th>RPM</th></tr>";
            G.peaks.forEach((p, i) => {
                const t = (p * G.envelopeWindow / G.sr).toFixed(3);
                const period = i ? (periods[i - 1] * 1000).toFixed(1) : "";
                const rpm = i ? rpms[i - 1].toFixed(0) : "";
                peakTable.innerHTML += `<tr><td>${i + 1}</td><td>${t}</td><td>${period}</td><td>${rpm}</td></tr>`;
            });
        }

        function renderStats(s) {
            stats.innerHTML = `
                <div><b>Sample Rate</b><br>${s.sampleRate.toFixed(0)} Hz</div>
                <div><b>Duration</b><br>${s.duration.toFixed(3)} s</div>
                <div><b>Detected Peaks</b><br>${s.peakCount}</div>
                <div><b>Median Period</b><br>${s.medPeriod.toFixed(1)} ms</div>
                <div><b>Peak Frequency</b><br>${s.peakFreq.toFixed(2)} Hz</div>
                <div><b>FFT Envelope</b><br>${s.fftFreq.toFixed(2)} Hz</div>
                <div><b>RPM x120</b><br>${s.rpm120.toFixed(0)}</div>
                <div><b>RPM x240</b><br>${s.rpm240.toFixed(0)}</div>
                <div><b>RPM StdDev</b><br>${s.rpmStddev.toFixed(0)}</div>
            `;
        }

        function drawWaveform(signal, canvasId, color) {
            let c = document.getElementById(canvasId), ctx = c.getContext("2d");
            ctx.clearRect(0, 0, c.width, c.height);
            if (!signal || !signal.length) return;

            const step = Math.max(1, Math.floor(signal.length / 1000));
            const samples = [];
            for (let i = 0; i < signal.length; i += step) {
                samples.push(signal[i]);
            }

            const peak = Math.max(...samples.map(x => Math.abs(x)));
            if (peak === 0) return;

            ctx.strokeStyle = color;
            ctx.lineWidth = 1;
            ctx.beginPath();
            samples.forEach((v, i) => {
                let x = i * c.width / samples.length;
                let y = c.height / 2 - (v / peak) * (c.height / 2);
                i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
            });
            ctx.stroke();

            ctx.strokeStyle = "#d1d5db";
            ctx.setLineDash([3, 3]);
            ctx.beginPath();
            ctx.moveTo(0, c.height / 2);
            ctx.lineTo(c.width, c.height / 2);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawRawWaveform(signal) {
            drawWaveform(signal, "rawCanvas", "#3b82f6");
        }

        function drawFilteredWaveform(signal) {
            drawWaveform(signal, "filteredCanvas", "#10b981");
        }

        function drawEnvelope() {
            let c = envCanvas, ctx = c.getContext("2d");
            ctx.clearRect(0, 0, c.width, c.height);

            if (!G.sm) return;

            let win = Number(document.getElementById("viewSec").value);
            let end = G.start + win;

            viewInfo.textContent = `${G.start.toFixed(2)}s → ${Math.min(end, G.duration).toFixed(2)}s`;

            let sIdx = Math.floor(G.start * G.sr / G.envelopeWindow);
            let eIdx = Math.min(G.sm.length, Math.floor(end * G.sr / G.envelopeWindow));

            let arr = G.sm.slice(sIdx, eIdx);
            if (!arr.length) return;

            let max = G.threshold;
            for (let v of arr) if (v > max) max = v;

            ctx.strokeStyle = "#2563eb";
            ctx.lineWidth = 2;
            ctx.beginPath();
            arr.forEach((v, i) => {
                let x = i * c.width / arr.length;
                let y = c.height - (v / max) * c.height;
                i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
            });
            ctx.stroke();

            ctx.strokeStyle = "#ef4444";
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            let ty = c.height - (G.threshold / max) * c.height;
            ctx.beginPath();
            ctx.moveTo(0, ty);
            ctx.lineTo(c.width, ty);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.strokeStyle = "#10b981";
            ctx.lineWidth = 2;
            ctx.fillStyle = "#10b981";
            ctx.font = "12px sans-serif";

            G.peaks.forEach((p, idx) => {
                if (p >= sIdx && p < eIdx) {
                    let x = (p - sIdx) * c.width / arr.length;
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, c.height);
                    ctx.stroke();
                    ctx.fillText(idx + 1, x + 2, 12);
                }
            });
        }

        function drawFFT() {
            let c = fftCanvas, ctx = c.getContext("2d");
            ctx.clearRect(0, 0, c.width, c.height);
            if (!G.fft) return;

            let max = Math.max(...G.fft);
            ctx.strokeStyle = "#8b5cf6";
            ctx.lineWidth = 2;
            ctx.beginPath();
            G.fft.forEach((v, i) => {
                let x = i * c.width / G.fft.length;
                let y = c.height - (v / max) * c.height;
                i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
            });
            ctx.stroke();
        }

        async function startMic() {
            try {
                micContext = new AudioContext();
                micStream = await navigator.mediaDevices.getUserMedia({audio: true});

                const source = micContext.createMediaStreamSource(micStream);
                analyser = micContext.createAnalyser();
                analyser.fftSize = 4096;
                source.connect(analyser);

                realtimeBuffer = [];
                isCalibrating = true;
                calibrationTime = 0;

                micStatus.textContent = "Recording (Calibrating...)";
                updateCalibrationStatus("🔧 Đang hiệu chỉnh... (3 giây)", 'info');

                realtimeLoop();
            } catch (err) {
                alert("Không thể truy cập micro: " + err.message);
            }
        }

        function stopMic() {
            if (micStream) {
                micStream.getTracks().forEach(t => t.stop());
            }
            analyser = null;
            isCalibrating = false;
            micStatus.textContent = "Stopped";
            updateCalibrationStatus("");
        }

        function realtimeLoop() {
            if (!analyser) return;

            const buf = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buf);
            realtimeBuffer.push(...buf);

            let maxSamples = BUFFER_DURATION * micContext.sampleRate;
            if (realtimeBuffer.length > maxSamples) {
                realtimeBuffer = realtimeBuffer.slice(realtimeBuffer.length - maxSamples);
            }

            const now = performance.now();
            
            if(now - lastUpdate > 500){
                const result = analyzeSamples(Float32Array.from(realtimeBuffer), micContext.sampleRate);
                
                if (isCalibrating) {
                    calibrationTime += 0.5;
                    if (calibrationTime >= CALIBRATION_DURATION) {
                        const calibration = autoCalibrate(result);
                        document.getElementById("thr").value = calibration.thrValue.toFixed(2);
                        document.getElementById("smooth").value = calibration.smoothValue;
                        
                        let message = "✅ Hiệu chỉnh hoàn tất!<br>";
                        if (calibration.recommendations.length > 0) {
                            message += calibration.recommendations.join("<br>");
                        } else {
                            message += "Thông số tối ưu!";
                        }
                        
                        updateCalibrationStatus(message, 'success');
                        isCalibrating = false;
                        micStatus.textContent = "Recording (Live)";
                    } else {
                        const progress = Math.round((calibrationTime / CALIBRATION_DURATION) * 100);
                        updateCalibrationStatus(`🔧 Đang hiệu chỉnh... ${progress}% (Peaks: ${result.peakCount})`, 'info');
                    }
                }
                
                updateUI(result);
                lastUpdate = now;
            }

            if(now - lastFFT > 500) {
                drawFFT();
                drawEnvelope();
                lastFFT = now;
            }

            requestAnimationFrame(realtimeLoop);
        }

        function prevView() {
            if (!G.duration) return;
            G.start = Math.max(0, (G.start || 0) - (+viewSec.value));
            drawEnvelope();
        }

        function nextView() {
            if (!G.duration) return;
            G.start = Math.min(Math.max(0, G.duration - (+viewSec.value)), (G.start || 0) + (+viewSec.value));
            drawEnvelope();
        }

        function resetParameters() {
            Object.keys(DEFAULT_PARAMS).forEach(key => {
                const elem = document.getElementById(key);
                if (elem) elem.value = DEFAULT_PARAMS[key];
            });
            updateDisplays();
            updateCalibrationStatus("");
            
            if (G.sm) {
                const result = analyzeSamples(Float32Array.from(realtimeBuffer || []), G.sr || 44100);
                updateUI(result);
            }
        }

        function loadPreset(name) {
            const preset = PRESETS[name];
            if (!preset) return;
            
            Object.keys(preset).forEach(key => {
                const elem = document.getElementById(key);
                if (elem) elem.value = preset[key];
            });
            updateDisplays();
            
            if (G.sm) {
                const result = analyzeSamples(Float32Array.from(realtimeBuffer || []), G.sr || 44100);
                updateUI(result);
            }
        }

        function updateDisplays() {
            document.getElementById("hpfDisplay").textContent = document.getElementById("hpfFreq").value + " Hz";
            document.getElementById("lpfDisplay").textContent = document.getElementById("lpfFreq").value + " Hz";
            document.getElementById("noiseGateDisplay").textContent = Number(document.getElementById("noiseGate").value).toFixed(2);
            document.getElementById("compRatioDisplay").textContent = Number(document.getElementById("compRatio").value).toFixed(1) + ":1";
            document.getElementById("volumeDisplay").textContent = document.getElementById("volumeInput").value + "%";
            document.getElementById("minAmpDisplay").textContent = Number(document.getElementById("minAmplitude").value).toFixed(2);
            document.getElementById("maxAmpDisplay").textContent = Number(document.getElementById("maxAmplitude").value).toFixed(2);
            document.getElementById("thrDisplay").textContent = Number(document.getElementById("thr").value).toFixed(2);
        }

        // Event listeners
        ["hpfFreq", "lpfFreq", "noiseGate", "compRatio", "volumeInput", "minAmplitude", "maxAmplitude", "normalizeMode", "thr", "envWin", "smooth", "peakMs"].forEach(id => {
            const elem = document.getElementById(id);
            if (elem) {
                elem.addEventListener("change", function() {
                    updateDisplays();
                    if (G.sm) {
                        const result = analyzeSamples(Float32Array.from(realtimeBuffer || []), G.sr || 44100);
                        updateUI(result);
                    }
                });
                elem.addEventListener("input", function() {
                    updateDisplays();
                });
            }
        });

        updateDisplays();
    </script>
</body>

</html>
