<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máy Đo Vòng Tua Xe Máy (RPM) - Phân Tích File</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { color: #00ffcc; font-size: 1.5rem; margin-bottom: 5px; }
        .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 20px; }
        .rpm-display {
            font-size: 5rem;
            font-weight: bold;
            color: #ff3366;
            margin: 15px 0;
            text-shadow: 0 0 15px rgba(255,51,102,0.6);
            font-family: monospace;
        }
        .freq-display {
            font-size: 1.1rem;
            color: #aaaaaa;
            margin-bottom: 20px;
        }
        .section {
            background: #252525;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #333;
        }
        button {
            background-color: #00ffcc;
            color: #121212;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,255,204,0.2);
            width: 100%;
            margin-top: 5px;
        }
        button:hover { background-color: #00cc99; }
        input[type="file"] {
            display: none;
        }
        .file-label {
            display: block;
            background: #333;
            color: #00ffcc;
            border: 1px dashed #00ffcc;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .file-label:hover { background: #3c3c3c; }
        canvas {
            width: 100%;
            height: 120px;
            background-color: #050505;
            margin-top: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>MÁY ĐO VÒNG TUA RPM R2</h1>
    <div class="subtitle">Động cơ 4 thì, 1 xi-lanh (Hỗ trợ đọc file ghi âm)</div>
    
    <div class="rpm-display" id="rpmValue">0000</div>
    <div class="freq-display">Tần số đỉnh: <span id="freqValue" style="color: #00ffcc; font-weight:bold;">0.0</span> Hz</div>
    
    <div class="section">
        <label for="fileInput" class="file-label" id="fileLabel">📁 CHỌN FILE GHI ÂM (.M4A, .MP3, .WAV)</label>
        <input type="file" id="fileInput" accept="audio/*">
    </div>

    <div class="section">
        <button id="startBtn">🎤 ĐO TRỰC TIẾP QUA MICRO</button>
    </div>
    
    <canvas id="visualizer"></canvas>
</div>

<script>
    let audioCtx = null;
    let analyser = null;
    let source = null;
    let isRecording = false;
    let animationId = null;
    
    const startBtn = document.getElementById('startBtn');
    const fileInput = document.getElementById('fileInput');
    const fileLabel = document.getElementById('fileLabel');
    const rpmValue = document.getElementById('rpmValue');
    const freqValue = document.getElementById('freqValue');
    const canvas = document.getElementById('visualizer');
    const canvasCtx = canvas.getContext('2d');

    // CẤU HÌNH THUẬT TOÁN ĐO RPM
    const minFreq = 10;  // ~1200 RPM
    const maxFreq = 95;  // ~11400 RPM

    // XỬ LÝ KHI CHỌN FILE GHI ÂM
    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        fileLabel.innerText = "📄 " + file.name;
        stopDirectRecording(); // Tắt chế độ micro nếu đang bật

        // Khởi tạo Audio Context độc lập cho File
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        const fileReader = new FileReader();
        fileReader.onload = async function() {
            try {
                const arrayBuffer = fileReader.result;
                // Giải mã file âm thanh sang AudioBuffer
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                
                // Thiết lập chuỗi phân tích
                const bufferSource = audioCtx.createBufferSource();
                bufferSource.buffer = audioBuffer;
                
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 4096;
                
                let filter = audioCtx.createBiquadFilter();
                filter.type = "lowpass";
                filter.frequency.setValueAtTime(150, audioCtx.currentTime);

                bufferSource.connect(filter);
                filter.connect(analyser);
                bufferSource.connect(audioCtx.destination); // Phát ra loa để nghe lại
                
                bufferSource.start(0);
                isRecording = true;
                
                // Tiến hành quét dữ liệu
                function analyzeFrame() {
                    if (!isRecording) return;
                    updateAudioProcessor();
                    animationId = requestAnimationFrame(analyzeFrame);
                }
                analyzeFrame();
                
                bufferSource.onended = () => {
                    isRecording = false;
                    cancelAnimationFrame(animationId);
                };
                
            } catch (err) {
                alert("Không thể phân tích file này. Hãy thử file ghi âm khác! Chi tiết: " + err.message);
            }
        };
        fileReader.readAsArrayBuffer(file);
    });

    // XỬ LÝ ĐO QUA MICRO TRỰC TIẾP
    startBtn.addEventListener('click', async () => {
        if (isRecording) {
            stopDirectRecording();
            return;
        }

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            alert("Trình duyệt không hỗ trợ truy cập Micro.");
            return;
        }

        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, 
                video: false 
            });
            
            source = audioCtx.createMediaStreamSource(stream);
            
            let filter = audioCtx.createBiquadFilter();
            filter.type = "lowpass";
            filter.frequency.setValueAtTime(150, audioCtx.currentTime);
            
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 4096; 
            analyser.smoothingTimeConstant = 0.7;
            
            source.connect(filter);
            filter.connect(analyser);
            
            startBtn.innerText = "🛑 DỪNG ĐO MICRO";
            startBtn.style.backgroundColor = "#ff3366";
            isRecording = true;
            
            function loop() {
                if (!isRecording) return;
                updateAudioProcessor();
                animationId = requestAnimationFrame(loop);
            }
            loop();
        } catch (err) {
            alert("Lỗi Micro: " + err.message);
        }
    });

    function stopDirectRecording() {
        isRecording = false;
        if (audioCtx) audioCtx.close().then(() => { audioCtx = null; });
        cancelAnimationFrame(animationId);
        startBtn.innerText = "🎤 ĐO TRỰC TIẾP QUA MICRO";
        startBtn.style.backgroundColor = "#00ffcc";
        rpmValue.innerText = "0000";
        freqValue.innerText = "0.0";
    }

    // THUẬT TOÁN TÍNH TOÁN CORE
    function updateAudioProcessor() {
        const fftSize = analyser.fftSize;
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        analyser.getByteFrequencyData(dataArray);
        
        drawVisualizer(dataArray, bufferLength);
        
        const sampleRate = audioCtx.sampleRate;
        let maxVal = -1;
        let maxIndex = -1;
        
        for (let i = 0; i < bufferLength; i++) {
            let freq = (i * sampleRate) / fftSize;
            if (freq >= minFreq && freq <= maxFreq) {
                if (dataArray[i] > maxVal) {
                    maxVal = dataArray[i];
                    maxIndex = i;
                }
            }
        }
        
        if (maxIndex !== -1 && maxVal > 50) { 
            let peakFreq = (maxIndex * sampleRate) / fftSize;
            let rpm = Math.round(peakFreq * 120);
            
            // Làm mịn giao diện bằng cách làm tròn về hàng chục
            rpm = Math.round(rpm / 10) * 10;
            
            freqValue.innerText = peakFreq.toFixed(1);
            rpmValue.innerText = rpm;
        }
    }

    function drawVisualizer(dataArray, bufferLength) {
        canvasCtx.fillStyle = '#050505';
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        
        const sampleRate = audioCtx.sampleRate;
        const maxVisibleBin = Math.floor((150 * analyser.fftSize) / sampleRate);
        const barWidth = canvas.width / maxVisibleBin;
        
        let x = 0;
        for(let i = 0; i < maxVisibleBin; i++) {
            let barHeight = (dataArray[i] / 255) * canvas.height;
            canvasCtx.fillStyle = dataArray[i] > 60 ? '#ff3366' : '#00ffcc';
            canvasCtx.fillRect(x, canvas.height - barHeight, barWidth - 1, barHeight);
            x += barWidth;
        }
    }
</script>
</body>
</html>
